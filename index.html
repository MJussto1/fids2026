<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="30">
    <title>FIDS - Panel de Vuelos</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #0c1017; color: #ffffff; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #1f293d; padding-bottom: 10px; margin-bottom: 20px; }
        .logo { font-size: 24px; font-weight: bold; color: #38bdf8; }
        .clock { font-size: 22px; font-weight: bold; color: #a1a1aa; }
        .container { display: flex; gap: 20px; }
        .panel { flex: 1; background: #161b22; border-radius: 8px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h2 { text-align: center; margin-top: 0; color: #f8fafc; text-transform: uppercase; letter-spacing: 2px; border-bottom: 2px solid #30363d; padding-bottom: 8px; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        
        th { background-color: #21262d; color: #8b949e; padding: 10px; font-size: 14px; text-transform: uppercase; }
        td { padding: 12px 10px; border-bottom: 1px solid #30363d; font-size: 16px; font-weight: 500; color: #ffffff; vertical-align: middle; }
        
        /* Primera columna (Origen/Destino) en AMARILLO */
        td:first-child { color: #eab308; font-weight: bold; }
        
        /* Estilo para las imágenes de los logos */
        .logo-aerolinea { max-height: 25px; width: auto; display: block; }
        
        /* Estilo de fila en estado crítico (+/- 5 minutos) */
        .resaltado { background-color: #b45309 !important; }
        .resaltado td { color: #ffffff !important; } 
        .resaltado td:first-child { color: #ffffff !important; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">✈️ FIDS - OPERACIONES</div>
        <div class="clock">Última Actualización: 2026-07-03 12:45:09</div>
    </div>
    <div class="container">
        <div class="panel">
            <h2>Llegadas / Arrivals</h2>
            <table>
                <tr><th>Origen</th><th>Aerolínea</th><th>Vuelo</th><th>Hora</th><th>Estatus</th><th>Est.</th></tr><tr class="resaltado"><td>TIJ</td><td>VOLARIS</td><td>3220</td><td>12:50:00</td><td>en tiempo</td><td>12:50:00</td></tr><tr><td>SLP</td><td>VOLARIS</td><td>1112</td><td>13:00:00</td><td></td><td></td></tr></table></div><div class="panel"><h2>Salidas / Departures</h2><table>
                <tr><th>Destino</th><th>Aerolínea</th><th>Vuelo</th><th>Hora</th><th>Puerta</th><th>Estatus</th></tr></table></div></div></body></html>
