<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>FIDS - SALIDAS</title>
    <style>
        body { background-color: #000000; color: #FFFFFF; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 30px; overflow: hidden; }
        
        /* DISEÑO DE CABECERA CON COMPORTAMIENTO FLEXBOX */
        .header { 
            border-bottom: 5px solid #FFB300; 
            padding-bottom: 15px; 
            margin-bottom: 25px; 
        }
        
        .top-airport-title { 
            font-size: 2.8rem; 
            font-weight: 900; 
            color: #FFFFFF; 
            text-align: center; 
            text-transform: uppercase; 
            margin-bottom: 15px; 
            letter-spacing: 2px; 
        }
        
        .header-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            width: 100%; 
        }
        
        .logos-izquierda { 
            display: flex; 
            align-items: center; 
            gap: 20px; 
        }
        
        .bloque-derecho { 
            display: flex; 
            align-items: center; 
            gap: 20px; 
        }
        
        /* AJUSTE DE IMÁGENES DE CABECERA */
        .logo-top-aip { max-height: 90px; width: auto; } 
        .logo-top-gmm { max-height: 90px; width: auto; border-radius: 4px; } 
        
        .header h1 { margin: 0; color: #FFB300; font-size: 2.8rem; text-transform: uppercase; font-weight: 800; }
        .clock { color: #FFFFFF; font-size: 3rem; font-weight: bold; }
        
        .fids-section { width: 100%; }
        .fids-section h2 { font-size: 2.2rem; margin-top: 0; margin-bottom: 15px; text-transform: uppercase; font-weight: bold; border-bottom: 2px solid #2C2C2E; padding-bottom: 5px; }
        table { width: 100%; border-collapse: collapse; font-size: 2.2rem; font-weight: bold; }
        th { text-align: left; color: #8E8E93; border-bottom: 3px solid #2C2C2E; padding: 12px; font-size: 1.6rem; text-transform: uppercase; }
        td { padding: 18px 12px; border-bottom: 1px solid #1C1C1E; vertical-align: middle; }
        .vuelo { color: #FFB300; }
        .destino { color: #FFFFFF; }
        .hora { color: #FFFFFF; }
        .sala { color: #FFFFFF; }
        .estatus { text-transform: uppercase; }
        .estatus-a-tiempo { color: #00FF00; }
        .estatus-demorado { color: #FF3B30; }
        .logo-aerolinea { max-height: 35px; width: auto; display: block; }
        .resaltado { background-color: #b45309 !important; animation: blink 2s infinite; }
        .resaltado td, .resaltado .vuelo { color: #ffffff !important; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="header">
        <div class="top-airport-title">AEROPUERTO INTERNACIONAL DE PUEBLA</div>
        <div class="header-row">
            
            <div class="logos-izquierda">
                <img src="recursos/logoAIP.png" alt="Logo AIP" class="logo-top-aip">
                <h1>Salidas / Departures</h1>
            </div>
            
            <div class="bloque-derecho">
                <img src="recursos/LogoGMMSF.jpg" alt="Logo GMM" class="logo-top-gmm">
                <div class="clock" id="liveClock">00:00</div>
            </div>
            
        </div>
    </div>
    <div class="fids-section">
        <h2 style="color: #4ade80;">Salidas / Departures</h2>
        <table>
            <thead><tr><th>Destino</th><th>Aerolínea</th><th>Vuelo</th><th>Hora</th><th>Puerta</th><th>Estatus</th></tr></thead>
            <tbody>
                <tr class="">
                    <td class="vuelo">TIJ</td>
                    <td><img src="recursos/v.png" alt="Volaris" class="logo-aerolinea" style="max-height: 35px; width: auto;"></td>
                    <td class="destino">3223</td>
                    <td class="hora">17:45:00</td>
                    <td class="sala"></td>
                    <td class="estatus estatus-a-tiempo">A TIEMPO</td>
                </tr>
                <tr class="">
                    <td class="vuelo">BJX</td>
                    <td><img src="recursos/v.png" alt="Volaris" class="logo-aerolinea" style="max-height: 35px; width: auto;"></td>
                    <td class="destino">604</td>
                    <td class="hora">19:00:00</td>
                    <td class="sala"></td>
                    <td class="estatus estatus-a-tiempo">A TIEMPO</td>
                </tr>
                <tr class="">
                    <td class="vuelo">GDL</td>
                    <td><img src="recursos/v.png" alt="Volaris" class="logo-aerolinea" style="max-height: 35px; width: auto;"></td>
                    <td class="destino">1397</td>
                    <td class="hora">20:18:00</td>
                    <td class="sala"></td>
                    <td class="estatus estatus-a-tiempo">A TIEMPO</td>
                </tr>
                <tr class="">
                    <td class="vuelo">TIJ</td>
                    <td><img src="recursos/VI.png" alt="Viva" class="logo-aerolinea" style="max-height: 35px; width: auto;"></td>
                    <td class="destino">5117</td>
                    <td class="hora">21:35:00</td>
                    <td class="sala"></td>
                    <td class="estatus estatus-a-tiempo">A TIEMPO</td>
                </tr>
                <tr class="">
                    <td class="vuelo">GDL</td>
                    <td><img src="recursos/v.png" alt="Volaris" class="logo-aerolinea" style="max-height: 35px; width: auto;"></td>
                    <td class="destino">3245</td>
                    <td class="hora">21:50:00</td>
                    <td class="sala"></td>
                    <td class="estatus estatus-a-tiempo">A TIEMPO</td>
                </tr>
                <tr class="">
                    <td class="vuelo">MTY</td>
                    <td><img src="recursos/VI.png" alt="Viva" class="logo-aerolinea" style="max-height: 35px; width: auto;"></td>
                    <td class="destino">4009</td>
                    <td class="hora">22:55:00</td>
                    <td class="sala"></td>
                    <td class="estatus estatus-a-tiempo">A TIEMPO</td>
                </tr>
            </tbody>
        </table>
    </div>
    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('liveClock').textContent = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
        }
        setInterval(updateClock, 1000); updateClock();
        
        setTimeout(function() {
            const url = new URL(window.location.href);
            url.searchParams.set('t', new Date().getTime());
            window.location.href = url.toString();
        }, 15000);
    </script>
</body>
</html>
