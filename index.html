<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="15"> <title>FIDS - Panel de Información de Vuelos</title>
    <style>
        body { background-color: #000000; color: #FFFFFF; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 30px; overflow: hidden; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid #FFB300; padding-bottom: 15px; margin-bottom: 25px; }
        .header h1 { margin: 0; color: #FFB300; font-size: 3rem; text-transform: uppercase; font-weight: 800; }
        .clock { color: #FFFFFF; font-size: 2.5rem; font-weight: bold; }
        
        .fids-container { display: flex; gap: 40px; }
        .fids-panel { flex: 1; }
        
        table { width: 100%; border-collapse: collapse; font-size: 2.2rem; font-weight: bold; }
        th { text-align: left; color: #8E8E93; border-bottom: 3px solid #2C2C2E; padding: 12px; font-size: 1.6rem; text-transform: uppercase; }
        td { padding: 18px 12px; border-bottom: 1px solid #1C1C1E; vertical-align: middle; }
        
        /* Columna 1 (Origen / Destino) siempre en AMARILLO */
        td:first-child { color: #FFB300; }
        
        .logo-aerolinea { max-height: 35px; width: auto; display: block; }
        
        /* Estilo crítico (+/- 5 minutos) */
        .resaltado { background-color: #b45309 !important; }
        .resaltado td { color: #ffffff !important; }
        .resaltado td:first-child { color: #ffffff !important; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Información de Vuelos / Flight Information</h1>
        <div class="clock" id="liveClock">00:00</div>
    </div>

    <div class="fids-container">
        <div class="fids-panel">
            <h2 style="color: #38bdf8; font-size: 2.2rem; margin-top: 0; text-transform: uppercase;">Llegadas / Arrivals</h2>
            <table>
                <thead>
                    <tr><th>Origen</th><th>Aerolínea</th><th>Vuelo</th><th>Hora</th><th>Estatus</th><th>Est.</th></tr>
                </thead>
                <tbody><tr class="resaltado"><td>TIJ</td><td><img src="recursos/v.png" alt="Volaris" class="logo-aerolinea"></td><td>3220</td><td>12:50:00</td><td>en tiempo</td><td>12:50:00</td></tr><tr><td>SLP</td><td><img src="recursos/v.png" alt="Volaris" class="logo-aerolinea"></td><td>1112</td><td>13:00:00</td><td></td><td></td></tr>                </tbody>
            </table>
        </div>

        <div class="fids-panel">
            <h2 style="color: #4ade80; font-size: 2.2rem; margin-top: 0; text-transform: uppercase;">Salidas / Departures</h2>
            <table>
                <thead>
                    <tr><th>Destino</th><th>Aerolínea</th><th>Vuelo</th><th>Hora</th><th>Puerta</th><th>Estatus</th></tr>
                </thead>
                <tbody>                </tbody>
            </table>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('liveClock').textContent = hours + ':' + minutes;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
